<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Tholema – Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="home">
    <!-- Menü Dropdown -->
    <div class="menu-container">
        <button class="menu-button" id="menuButton"> ☰ </button>

        <div class="menu-dropdown" id="menuDropdown">
            <a href="./lebenslauf.html">Lebenslauf</a>
            <a href="./uni.html">Meine Hochschule</a>
            <a href="./persoenlich.html">Persönliches</a>
        </div>
    </div>

    <!-- responsive Layout - Website passt sich automatisch an jedes Gerät an. -->
    <div class="container"> 
        <!-- absolute Positionierung - platziert ein Element ganz genau an eine Stelle -->
        <div class="scene">
            <h3 class="hint">Einige Elemente dieser Seite sind interaktiv. <br> Entdecken Sie sie gerne. </h3>
            <div class="wall"></div>
            <!-- <div class="table"></div> -->

            <!-- Bilder -->
            <img src="./images/carpet.png" class="carpet">
            <img src="./images/table.png" class="table" alt="Schreibtisch">
            <a href="./persoenlich.html">
                <img src="./images/shelf.png" class="shelf clickable" alt="Hobby-Regal">
            </a>

            <img src="./images/plant.png" class="plant" alt="Pflanze">
            <img src="./images/pinboard.png" class="pinboard" alt="Pinnwand">

            <a href="./lebenslauf.html">
                <img src="./images/Lebenslauf_bild.png" class="lebenslauf-note clickable" alt="Lebenslauf">
            </a>

            <a href="./uni.html">
                <img src="./images/uni-note.png" class="uni-note clickable" alt="Uni-Bild">
            </a>

            <img src="./images/screen.png" class="screen" alt="Bildschirm">
        </div>
    </div>
</body>

</html>
